# Netlify Configuration

[build]
  command = "npm run build" # دستور ساخت پروژه شما (اگر دستور خاصی دارید اینجا قرار دهید)
  publish = ".next"  # مسیر ساخت اپلیکیشن (معمولاً "out" برای پروژه‌های Next.js PWA)

[[plugins]]
  package = "@netlify/plugin-nextjs"  # پشتیبانی از Next.js

[[headers]]
  # تنظیمات برای API‌ها
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"  # به تمام دامنه‌ها اجازه می‌دهیم درخواست بفرستند
    Access-Control-Allow-Credentials = "true"  # به کوکی‌ها اجازه ارسال می‌دهیم
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"  # فقط متدهای مجاز
    Access-Control-Allow-Headers = "Authorization, Content-Type, X-Custom-Header"

[[headers]]
  # تنظیمات برای صفحات
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600"  # کش صفحات
    Access-Control-Allow-Origin = "*"  # به تمام دامنه‌ها اجازه می‌دهیم درخواست بفرستند
    Access-Control-Allow-Credentials = "true"  # به کوکی‌ها اجازه ارسال می‌دهیم

[functions]
  # تنظیمات مربوط به توابع Netlify
  directory = "netlify"  # مسیر توابع Netlify
  node_bundler = "esbuild"  # برای استفاده از esbuild

[dev]
  functions = "netlify/functions"  # مسیر توابع در محیط توسعه
  command = "npm run dev"  # دستور توسعه برای پروژه شما
  port = 3000  # پورت توسعه

# پیکربندی برای PWA
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=31536000, immutable"

[[redirects]]
  # تنظیمات ریدایرکت به صفحات لاگین و دیگر صفحات
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  # ریدایرکت به صفحه اصلی در صورت نیاز
  from = "/"
  to = "/index.jsx"
  status = 200

[[redirects]]
  # ریدایرکت به صفحات API برای CORS
  from = "/api/*"
  to = "/.netlify/"
  status = 200
  force = true
